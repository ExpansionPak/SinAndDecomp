name: Tsumi To Batsu (Japanese)
sha1: 581297b9d5c3a4c33169ae0aae218c742cd9cbcf
options:
  basename: tsumitobatsu
  target_path: baserom.z64
  elf_path: build/tsumitobatsu.elf
  base_path: .
  platform: n64
  compiler: IDO

  # asm_path: asm
  # src_path: src
  # build_path: build
  # create_asm_dependencies: True

  ld_script_path: tsumitobatsu.ld
  ld_dependencies: True

  find_file_boundaries: True
  header_encoding: ASCII

  o_as_suffix: True
  use_legacy_include_asm: False
  mips_abi_float_regs: o32

  # section_order: [".text", ".data", ".rodata", ".bss"]
  # auto_link_sections: [".data", ".rodata", ".bss"]

  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  # undefined_funcs_auto_path: undefined_funcs_auto.txt
  # undefined_syms_auto_path: undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  # string_encoding: ASCII
  # data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
  # libultra_symbols: True
  # hardware_regs: True
  # gfx_ucode: # one of [f3d, f3db, f3dex, f3dexb, f3dex2]
segments:
  - name: header
    type: header
    start: 0x0

  - name: ipl3
    type: bin
    start: 0x40

  - name: entry
    type: code
    start: 0x1000
    vram: 0x80025C00
    subsegments:
      - [0x1000, hasm]

  - name: main
    type: code
    start: 0x1050
    vram: 0x80025C50
    follows_vram: entry
    subsegments:
      - [0x1050, asm, boot]
      - [0x18B50, asm]
      - [0x18BD0, asm]
      - [0x18CC0, asm]
      - [0x196A0, asm]
      - [0x19730, asm]
      - [0x19860, asm]
      - [0x19C50, asm]
      - [0x19DC0, asm]
      - [0x19FB0, asm]
      - [0x1A050, asm]
      - [0x1A1D0, asm]
